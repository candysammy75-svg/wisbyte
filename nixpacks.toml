[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm@10 --force", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/api-server run build",
  "pnpm --filter @workspace/db run push"
]

[start]
cmd = "node artifacts/api-server/dist/index.mjs"
